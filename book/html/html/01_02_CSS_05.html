<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>CSS 入門</title>
    <style>
      a:link,
      a:visited {
        color: rebeccapurple;
        font-weight: bold;
      }
      a:hover {
        color: hotpink;
      }
    </style>
  </head>

  <body>
    <h1>これは見出し 1 です</h1>

    <p>
      これはテキストの段落です。このテキストには
      <span>span 要素</span>と<a href="./html/01_01_form.html">リンク</a>があります。
    </p>

    <p class="highlight">
      これは 2 つ目の段落です。ここにはclass="highlight"が設定されています。
    </p>

    <ul>
      <li>1 つ目のアイテム</li>
      <li>2 つ目のアイテム</li>
      <li><em>3 つ目</em>のアイテム</li>
    </ul>
    <table>
    <thead>
        <tr>
        <th>名前</th>
        <th>点数</th>
        </tr>
    </thead>
        <tbody>
        <tr>
        <td>田中さん</td>
        <td>80点</td>
        </tr>
        <tr>
        <td>佐藤さん</td>
        <td>65点</td>
        </tr>
    </tbody>
    </table>  
    <a href="javascript:history.back();">戻る</a>

  </body>
</html>
