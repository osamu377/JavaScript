<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: sans-serif;
        }
        th, td {
            border: 1px solid #333;
        }
        th, td {
            padding: 12px 15px;
        }
        th {
            background-color: #4CAF50; /* ヘッダーは緑 */
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>    
</head>
<body>
    <table>
    <thead>
        <tr>
        <th>名前</th>
        <th>点数</th>
        </tr>
    </thead>
        <tbody>
        <tr>
        <td>田中さん</td>
        <td>80点</td>
        </tr>
        <tr>
        <td>佐藤さん</td>
        <td>65点</td>
        </tr>
    </tbody>
    </table>    
    
    <a href="javascript:history.back();">戻る</a>
</body>
</html>
