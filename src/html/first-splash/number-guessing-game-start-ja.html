<!DOCTYPE html>
<html lang="ja-JP">
  <head>
    <meta charset="utf-8">

    <title>数当てゲーム</title>

    <style>
      html {
        font-family: sans-serif;
      }

      body {
        width: 50%;
        max-width: 800px;
        min-width: 480px;
        margin: 0 auto;
      }
      
      .form input[type="number"] {
        width: 200px;
      }

      .lastResult {
        color: white;
        padding: 3px;
      }
    </style>
  </head>

  <body>
    <h1>数当てゲーム</h1>

    <p>1から100までの数字をランダムに選びました。10ターン以内で当てられるか試してみてください。当てた数字が大きすぎたり小さすぎたりした場合はお知らせします。</p>
    <div class="form">
      <label for="guessField">推測した数字を入力してください: </label>
      <input type="number" min="1" max="100" required id="guessField" class="guessField">
      <input type="submit" value="決定" class="guessSubmit">
    </div>

    <div class="resultParas">
      <p class="guesses"></p>
      <p class="lastResult"></p>
      <p class="lowOrHi"></p>
    </div>

    <script>

      // Your JavaScript goes here

    </script>
  </body>
</html>
